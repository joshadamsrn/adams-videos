<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sam the Ninja</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 30px;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 20px;
    }

    .video-frame {
      width: 100%;
      height: 520px;
      background: #000;
      border: none;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .now-playing {
      margin: 12px 0 20px;
      font-size: 18px;
      color: #ccc;
    }

    .playlist {
      text-align: left;
      margin-top: 20px;
      background: #1b1b1b;
      border-radius: 12px;
      padding: 16px;
    }

    .track {
      padding: 12px;
      border-bottom: 1px solid #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .track:last-child {
      border-bottom: none;
    }

    .track:hover {
      background: #2a2a2a;
    }

    .cover-thumb {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .video-meta {
      text-align: left;
    }

    .video-author {
      font-size: 12px;
      color: #aaa;
    }

    @media (max-width: 768px) {
      body {
        padding: 16px;
      }

      .video-frame {
        height: 260px;
      }

      .track {
        padding: 10px;
      }

      .cover-thumb {
        width: 50px;
        height: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Sam the Ninja</h1>

    <iframe
      id="videoPlayer"
      class="video-frame"
      src=""
      title="Sam the Ninja video player"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen>
    </iframe>

    <div class="now-playing" id="nowPlaying">Now Playing:</div>

    <div class="playlist" id="playlist"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
