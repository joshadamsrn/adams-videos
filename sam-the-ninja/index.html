<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sam the Ninja</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 30px;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    video {
      width: 100%;
      max-height: 520px;
      background: #000;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .playlist {
      text-align: left;
      margin-top: 20px;
      background: #1b1b1b;
      border-radius: 12px;
      padding: 16px;
    }

    .track {
      padding: 12px;
      border-bottom: 1px solid #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .track:last-child {
      border-bottom: none;
    }

    .track:hover {
      background: #2a2a2a;
    }

    h1 {
      margin-bottom: 20px;
    }

    .now-playing {
      margin: 12px 0 20px;
      font-size: 18px;
      color: #ccc;
    }

    .cover-thumb {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .video-meta {
      text-align: left;
    }

    .video-author {
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Sam the Ninja</h1>

    <video id="videoPlayer" controls>
      <source id="videoSource" src="" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <div class="now-playing" id="nowPlaying">Now Playing:</div>

    <div class="playlist" id="playlist"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
